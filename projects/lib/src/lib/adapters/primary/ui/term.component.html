<button id="showAddSemesterBtn" (click)="changeVisibility(0)">Dodaj semestr</button>
<div id="addSemesterForm" style="visibility: hidden;">
  <form [formGroup] = "semesterForm" (ngSubmit)="addSemester()">
    <input formControlName="semester" id="inputAddSemester" placeholder="add semester" type="text"/>
    <button>Submit</button>
  </form>
  
  
</div>
<ul>
      <li *ngFor="let semester of semesters$ | async" class="list">
        <button [routerLink]="['/semester', semester.id]" class="termBtn">{{ semester.name }}</button>
        <button (click)="deleteSemester(semester.id)">Delete</button>
        <input placeholder="Edit Semester" type="text" #inputEdit>
        <button (click)="editSemester(semester.id, inputEdit.value)">Edit</button>
        
      </li>
    </ul>
