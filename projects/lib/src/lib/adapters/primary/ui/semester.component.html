
<ul>
      <li *ngFor="let subject of subjects$ | async">
        <button [routerLink]="['subject', subject.id]">{{ subject.name }}</button>
        <button (click)="deleteSubject(subject.id)">Delete</button>
      </li>
      
    </ul>
    <input placeholder="add subject" type="text" #inputRef>
    <button (click)="addSubject(inputRef.value)">Dodaj</button>
