<ul>
    <li *ngFor="let note of notes$ | async">{{note.note}}
        <button (click)="deleteNote(note.id)">Delete</button>
        <input placeholder="Edit Note" type="text" #inputEdit>
        <button (click)="editNote(note.id, inputEdit.value)">Edit</button>
    </li>
    
</ul>
<input placeholder="add note" type="text" #inputRef>
<button (click)="addNote(inputRef.value)">Dodaj</button>
